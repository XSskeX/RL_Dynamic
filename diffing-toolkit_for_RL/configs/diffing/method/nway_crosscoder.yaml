# @package diffing.method
name: nway_crosscoder
requires_preprocessing: true

# N-way model list. Each item can be:
# - a model config name under configs/model, e.g. global_step_30
# - {config: model_config_name, name: optional_display_name}
# - {name: display_name, model_id: /path/or/hf/id, ...}
nway:
  run_name: null
  models: []
  pairwise_transitions: []

# Training parameters - mirrors crosscoder.yaml
training:
  expansion_factor: 32
  batch_size: 2048
  epochs: 2
  lr: 1e-4
  max_steps: null
  validate_every_n_steps: 10000
  mu: 1e-1
  k: 100
  k_max: 1024
  k_annealing_steps: 2000
  auxk_alpha: 0.03125

  num_samples: 150_000_000
  num_validation_samples: 5_000_000
  local_shuffling: true
  local_shuffling_shard_size: 1_000_000
  workers: 16

  overwrite: false

datasets:
  use_chat_dataset: false
  use_pretraining_dataset: false
  use_training_dataset: true
  normalization:
    enabled: true
    subsample_size: 1_000_000
    batch_size: 4096
    cache_dir: "${infrastructure.storage.base_dir}/normalizer_cache"
    target_rms: 100.0

model:
  type: "batch-top-k"
  code_normalization: "crosscoder"
  same_init_for_all_layers: true
  norm_init_scale: 1.0
  init_with_transpose: true

optimization:
  resample_steps: null
  warmup_steps: 1000

layers: null

analysis:
  enabled: true

  latent_scaling:
    enabled: false
    dataset_split: "train"
    targets: ["base_error", "ft_error", "base_reconstruction", "ft_reconstruction", "base_activation", "ft_activation"]
    num_samples: 100_000
    batch_size: 128
    num_workers: 4
    device: "cuda"
    dtype: "float32"
    num_effective_ft_only_latents: 5000
    overwrite: false

  latent_activations:
    enabled: false
    split: "train"
    overwrite: false
    upload_to_hub: false
    n_max_activations: 100
    min_threshold: 1e-4
    max_num_samples: 50000
    cache_device: "cuda"

  latent_steering:
    enabled: false
    overwrite: false
    prompts_file: "resources/steering_prompts_closed.txt"
    target_column: "dec_norm_diff"
    k: 10
    largest: false
    max_length: 512
    temperature: 1.0
    do_sample: false
    device: "cuda"
    use_chat_formatting: true
    enable_thinking: false
    steering_factors_percentages: [-0.5, 0.5, 0.8, 1.0, 1.5]
    steering_modes: ["prompt_only"]

upload:
  model: false
